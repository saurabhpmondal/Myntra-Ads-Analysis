<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<title>Myntra Ads Dashboard</title>

<link rel="stylesheet" href="css/reset.css">
<link rel="stylesheet" href="css/variables.css">
<link rel="stylesheet" href="css/layout.css">
<link rel="stylesheet" href="css/components.css">
<link rel="stylesheet" href="css/dashboard.css">
</head>

<body>

<div class="app">

  <!-- HEADER -->
  <div class="header">
    <div class="title">Product Listing Ads Reports</div>

    <div class="header-right">
      <input class="search" placeholder="Search Style ID / SKU">
      <button class="btn">Search</button>

      <div class="filter">
        <div class="filter-btn">This Month ▼</div>

        <div class="filter-box hidden">

          <div class="filter-left">
            <label><input type="radio"> Custom</label>
            <label><input type="radio"> Today</label>
            <label><input type="radio"> Yesterday</label>
            <label><input type="radio"> Last 7 days</label>
            <label><input type="radio"> Last Month</label>
            <label><input type="radio" checked> This Month</label>
          </div>

          <div class="filter-right">
            <div class="calendar">
              <div class="month">March 2026</div>
              <div class="days" id="cal1"></div>
            </div>

            <div class="calendar">
              <div class="month">April 2026</div>
              <div class="days" id="cal2"></div>
            </div>
          </div>

          <div class="filter-footer">
            <span>Indian Standard Time (GMT +05:30)</span>
            <button>Apply</button>
          </div>

        </div>
      </div>

    </div>
  </div>

  <!-- KPI -->
  <div class="kpis">
    <div class="card">Impressions <b>0</b></div>
    <div class="card">Clicks <b>0</b></div>
    <div class="card">CTR <b>0%</b></div>
    <div class="card">Units Sold <b>0</b></div>
    <div class="card">Revenue <b>₹0</b></div>
    <div class="card">Spend <b>₹0</b></div>
    <div class="card">ROI <b>0</b></div>
  </div>

  <!-- CHART -->
  <div class="chart">
    <div class="chart-top">
      <div class="dropdown" id="metricA">Spend ▼</div>
      <span>vs</span>
      <div class="dropdown" id="metricB">Revenue ▼</div>
    </div>

    <div class="chart-box">Chart will render here</div>
  </div>

  <!-- TABS -->
  <div class="tabs">
    <div class="tab active">Campaigns</div>
    <div class="tab">Daily View</div>
    <div class="tab">Placement Level</div>
    <div class="tab">Reports</div>
  </div>

  <div class="content">Campaign view</div>

</div>

<script type="module" src="js/main.js"></script>

</body>
</html>
