<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Myntra Ads Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="css/layout.css"/>

</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="left">
    <h1>Product Listing Ads Reports</h1>
  </div>

  <div class="right">

    <input class="search" placeholder="Search Style ID / SKU"/>
    <button class="search-btn">Search</button>

    <div class="filter-btn">
      This Month: 01 Mar 2026 to 24 Mar 2026 ▼
    </div>

  </div>

</header>

<!-- KPI ROW -->
<section class="kpi-row">

  <div class="card">
    <div class="title">Impressions</div>
    <div class="value">—</div>
  </div>

  <div class="card">
    <div class="title">Clicks</div>
    <div class="value">—</div>
  </div>

  <div class="card">
    <div class="title">CTR</div>
    <div class="value">—</div>
  </div>

  <div class="card">
    <div class="title">Units Sold</div>
    <div class="value">—</div>
  </div>

  <div class="card">
    <div class="title">Revenue</div>
    <div class="value">—</div>
  </div>

  <div class="card">
    <div class="title">Spend</div>
    <div class="value">—</div>
  </div>

  <div class="card">
    <div class="title">ROI</div>
    <div class="value">—</div>
  </div>

</section>

<!-- CHART -->
<section class="chart">

  <div class="chart-header">
    <select>
      <option>Spend</option>
    </select>

    <span>vs</span>

    <select>
      <option>Revenue</option>
    </select>
  </div>

  <div class="chart-box">
    Chart will render here
  </div>

</section>

<!-- TABS -->
<div class="tabs">
  <span class="active">Campaigns</span>
  <span>Daily View</span>
  <span>Placement Level</span>
  <span>Reports</span>
</div>

<div class="content">
  Campaign view
</div>

</body>
</html>
