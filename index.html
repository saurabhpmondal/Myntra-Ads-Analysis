<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Myntra Ads Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/reset.css"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="stylesheet" href="css/reports.css"/>
</head>

<body>

  <!-- HEADER -->
  <header class="header">
    <div class="header-left">
      <h1>Product Listing Ads Reports</h1>
    </div>

    <div class="header-right">
      <input id="productSearch" type="text" placeholder="Search Style ID / SKU"/>
      <button id="searchBtn">Search</button>

      <div class="date-filter" id="dateFilterBtn">
        This Month ▼
      </div>
    </div>
  </header>

  <!-- KPI ROW -->
  <section class="kpi-row" id="kpiRow"></section>

  <!-- CHART -->
  <section class="chart-section">
    <div class="chart-controls">
      <select id="metricA"></select>
      <span>vs</span>
      <select id="metricB"></select>
    </div>
    <div class="chart-box">Chart will render here</div>
  </section>

  <!-- TABS -->
  <div class="tabs">
    <button class="tab active" data-tab="campaign">Campaigns</button>
    <button class="tab" data-tab="daily">Daily View</button>
    <button class="tab" data-tab="placement">Placement Level</button>
    <button class="tab" data-tab="reports">Reports</button>
  </div>

  <!-- CONTENT -->
  <div class="tab-content" id="contentArea"></div>

  <!-- POPUP -->
  <div class="popup hidden" id="productPopup"></div>

<script src="js/app.js"></script>
<script src="js/ui/dropdown.js"></script>
<script src="js/ui/tabs.js"></script>
<script src="js/ui/search.js"></script>

</body>
</html>
