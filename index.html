<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Myntra Ads Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="css/reset.css"/>
<link rel="stylesheet" href="css/variables.css"/>
<link rel="stylesheet" href="css/layout.css"/>
<link rel="stylesheet" href="css/components.css"/>
<link rel="stylesheet" href="css/dashboard.css"/>

</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="header-left">
    <h1>Product Listing Ads Reports</h1>
  </div>

  <div class="header-right">

    <input type="text" placeholder="Search Style ID / SKU"/>
    <button>Search</button>

    <div class="date-filter-btn" id="openFilter">
      This Month: 01 Mar 2026 to 24 Mar 2026 ▼
    </div>

  </div>

</header>

<!-- FILTER MODAL -->
<div class="filter-overlay hidden" id="filterModal">

  <div class="filter-container">

    <!-- LEFT -->
    <div class="filter-left">
      <label><input type="radio" name="f"/> Custom</label>
      <label><input type="radio" name="f"/> Today</label>
      <label><input type="radio" name="f"/> Yesterday</label>
      <label><input type="radio" name="f"/> Last 7 days</label>
      <label><input type="radio" name="f"/> Last Month</label>
      <label><input type="radio" name="f" checked/> This Month</label>
    </div>

    <!-- RIGHT -->
    <div class="filter-right">
      <div class="calendar" id="cal1"></div>
      <div class="calendar" id="cal2"></div>
    </div>

    <!-- FOOTER -->
    <div class="filter-footer">
      <span>Indian Standard Time (GMT +05:30)</span>
      <button id="applyFilter">Apply</button>
    </div>

  </div>

</div>

<!-- KPI -->
<section class="kpi-row">
  <div class="kpi-card">Impressions</div>
  <div class="kpi-card">Clicks</div>
  <div class="kpi-card">CTR</div>
  <div class="kpi-card">Units Sold</div>
  <div class="kpi-card">Revenue</div>
  <div class="kpi-card">Spend</div>
  <div class="kpi-card">ROI</div>
</section>

<!-- CHART -->
<section class="chart-section">

  <div class="chart-controls">
    <select>
      <option>Spend</option>
    </select>

    <span>vs</span>

    <select>
      <option>Revenue</option>
    </select>
  </div>

  <div class="chart-box">Chart will render here</div>

</section>

<!-- TABS -->
<div class="tabs">
  <button class="tab active">Campaigns</button>
  <button class="tab">Daily View</button>
  <button class="tab">Placement Level</button>
  <button class="tab">Reports</button>
</div>

<div class="content">Campaign view</div>

<script src="js/ui/filter.js"></script>

</body>
</html>
