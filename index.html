<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Myntra Ads Dashboard</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>

  <link rel="stylesheet" href="css/reset.css"/>
  <link rel="stylesheet" href="css/variables.css"/>
  <link rel="stylesheet" href="css/layout.css"/>
  <link rel="stylesheet" href="css/components.css"/>
  <link rel="stylesheet" href="css/dashboard.css"/>
  <link rel="stylesheet" href="css/reports.css"/>

  <!-- Chart.js -->
  <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
</head>

<body>

<header class="header">
  <h1>Product Listing Ads Reports</h1>

  <div class="header-right">
    <input id="productSearch" placeholder="Search Style ID / SKU"/>
    <button id="searchBtn">Search</button>
    <div class="date-filter">This Month ▼</div>
  </div>
</header>

<section class="kpi-row" id="kpiRow"></section>

<section class="chart-section">
  <div class="chart-controls">
    <select id="metricA"></select>
    <span>vs</span>
    <select id="metricB"></select>
  </div>

  <canvas id="mainChart"></canvas>
</section>

<div class="tabs">
  <button class="tab active" data-tab="campaign">Campaigns</button>
  <button class="tab" data-tab="daily">Daily View</button>
  <button class="tab" data-tab="placement">Placement Level</button>
  <button class="tab" data-tab="reports">Reports</button>
</div>

<div id="contentArea"></div>

<div id="productPopup" class="popup hidden"></div>

<script src="js/app.js"></script>
<script src="js/ui/dropdown.js"></script>
<script src="js/ui/tabs.js"></script>
<script src="js/ui/search.js"></script>
<script src="js/ui/kpiCards.js"></script>
<script src="js/ui/chart.js"></script>

</body>
</html>
