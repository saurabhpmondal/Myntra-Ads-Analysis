<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Myntra Ads Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="css/reset.css"/>
<link rel="stylesheet" href="css/variables.css"/>
<link rel="stylesheet" href="css/layout.css"/>

</head>

<body>

<!-- HEADER -->
<header class="header">

  <h1>Product Listing Ads Reports</h1>

  <div class="header-right">

    <input type="text" placeholder="Search Style ID / SKU"/>
    <button class="search-btn">Search</button>

    <div class="filter-wrapper">

      <div class="date-filter-btn" id="openFilter">
        This Month: 01 Mar 2026 to 24 Mar 2026 ▼
      </div>

      <!-- FILTER DROPDOWN -->
      <div class="filter-dropdown hidden" id="filterModal">

        <div class="filter-left">
          <label><input type="radio"/> Custom</label>
          <label><input type="radio"/> Today</label>
          <label><input type="radio"/> Yesterday</label>
          <label><input type="radio"/> Last 7 days</label>
          <label><input type="radio"/> Last Month</label>
          <label><input type="radio" checked/> This Month</label>
        </div>

        <div class="filter-right">
          <div class="calendar" id="cal1"></div>
          <div class="calendar" id="cal2"></div>
        </div>

        <div class="filter-footer">
          <span>Indian Standard Time (GMT +05:30)</span>
          <button id="applyFilter">Apply</button>
        </div>

      </div>

    </div>

  </div>

</header>

<section class="kpi-row">
  <div class="kpi-card">Impressions</div>
  <div class="kpi-card">Clicks</div>
  <div class="kpi-card">CTR</div>
  <div class="kpi-card">Units Sold</div>
  <div class="kpi-card">Revenue</div>
  <div class="kpi-card">Spend</div>
  <div class="kpi-card">ROI</div>
</section>

<section class="chart-section">
  <div class="chart-box">Chart will render here</div>
</section>

<script src="js/ui/filter.js"></script>

</body>
</html>
