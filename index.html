<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Myntra Ads Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="css/layout.css"/>

</head>

<body>

<!-- HEADER -->
<header class="header">

  <div class="header-left">
    <h1>Product Listing Ads Reports</h1>
  </div>

  <div class="header-right">

    <input class="search" placeholder="Search Style ID / SKU"/>
    <button class="search-btn">Search</button>

    <!-- FILTER -->
    <div class="filter-wrapper">
      <div class="filter-btn">
        This Month: 01 Mar 2026 to 24 Mar 2026 ▼
      </div>
    </div>

  </div>

</header>

<!-- KPI -->
<section class="kpi-grid">

  <div class="kpi">Impressions<br><span>—</span></div>
  <div class="kpi">Clicks<br><span>—</span></div>
  <div class="kpi">CTR<br><span>—</span></div>
  <div class="kpi">Units Sold<br><span>—</span></div>
  <div class="kpi">Revenue<br><span>—</span></div>
  <div class="kpi">Spend<br><span>—</span></div>
  <div class="kpi">ROI<br><span>—</span></div>

</section>

<!-- CHART -->
<section class="chart">

  <div class="chart-header">
    <select>
      <option>Spend</option>
    </select>

    <span>vs</span>

    <select>
      <option>Revenue</option>
    </select>
  </div>

  <div class="chart-box">
    Chart will render here
  </div>

</section>

<!-- TABS -->
<div class="tabs">
  <div class="active">Campaigns</div>
  <div>Daily View</div>
  <div>Placement Level</div>
  <div>Reports</div>
</div>

<!-- CONTENT -->
<div class="content">
  Campaign view
</div>

</body>
</html>
