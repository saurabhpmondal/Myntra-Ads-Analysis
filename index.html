<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<title>Myntra Ads Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0"/>

<link rel="stylesheet" href="css/layout.css"/>

</head>

<body>

<header class="header">

  <div class="header-left">
    <h1>Product Listing Ads Reports</h1>
  </div>

  <div class="header-right">

    <input class="search" placeholder="Search Style ID / SKU"/>
    <button class="search-btn">Search</button>

    <div class="filter-wrapper">

      <div class="filter-btn" id="openFilter">
        This Month: 01 Mar 2026 to 24 Mar 2026 ▼
      </div>

      <!-- FILTER DROPDOWN -->
      <div class="filter-dropdown hidden" id="filterDropdown">

        <div class="filter-left">
          <label><input type="radio"/> Custom</label>
          <label><input type="radio"/> Today</label>
          <label><input type="radio"/> Yesterday</label>
          <label><input type="radio"/> Last 7 days</label>
          <label><input type="radio"/> Last Month</label>
          <label><input type="radio" checked/> This Month</label>
        </div>

        <div class="filter-right">
          <div class="calendar" id="cal1"></div>
          <div class="calendar" id="cal2"></div>
        </div>

        <div class="filter-footer">
          <span>Indian Standard Time (GMT +05:30)</span>
          <button id="applyFilter">Apply</button>
        </div>

      </div>

    </div>

  </div>

</header>

<!-- KPI -->
<section class="kpi-grid">

  <div class="kpi">Impressions<span>—</span></div>
  <div class="kpi">Clicks<span>—</span></div>
  <div class="kpi">CTR<span>—</span></div>
  <div class="kpi">Units Sold<span>—</span></div>
  <div class="kpi">Revenue<span>—</span></div>
  <div class="kpi">Spend<span>—</span></div>
  <div class="kpi">ROI<span>—</span></div>

</section>

<!-- CHART -->
<section class="chart">

  <div class="chart-header">
    <select>
      <option>Spend</option>
    </select>

    <span>vs</span>

    <select>
      <option>Revenue</option>
    </select>
  </div>

  <div class="chart-box">
    Chart will render here
  </div>

</section>

<!-- TABS -->
<div class="tabs">
  <div class="active">Campaigns</div>
  <div>Daily View</div>
  <div>Placement Level</div>
  <div>Reports</div>
</div>

<div class="content">Campaign view</div>

<script src="js/ui/filter.js"></script>

</body>
</html>
